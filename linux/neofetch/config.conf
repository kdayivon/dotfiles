# See this wiki page for more info:
# https://github.com/dylanaraps/neofetch/wiki/Customizing-Info
print_info() {
    prin "$(color 1)E L Y S I A N $(color 3)@ $(color 4)A R T E M I S"
    prin "⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻"
    info kernel
    info uptime
    info shell
    info de
    info term
    info cpu
    info memory
    prin "$(mypad) $(color 1)▂▂  $(color 2)▂▂  $(color 3)▂▂  $(color 4)▂▂  $(color 5)▂▂  $(color 6)▂▂  $(color 7)▂▂  "
    prin "⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻⸻"

}

# --- General -------------------------------------
title_fqdn="off"
kernel_shorthand="on"
uptime_shorthand="tiny"

# --- Memory -------------------------------------
memory_percent="on"
memory_unit="miB"

# --- Shell -------------------------------------
shell_path="off"
shell_version="on"

# --- CPU -------------------------------------
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"

# --- GTK / Themes -------------------------------------
gtk_shorthand="off"
gtk2="on"
gtk3="on"

# --- DE -------------------------------------
de_version="on"

# --- Colors & Style -------------------------------------
colors=(distro)
bold="on"
underline_enabled="on"
underline_char="-"
separator=":"
block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"

# --- Progress Bars -------------------------------------
bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

# --- Image -------------------------------------
image_backend="kitty"
image_source="/home/elysian/Pictures/artemis.png"
ascii_colors=(distro)
ascii_bold="on"
crop_mode="normal"
crop_offset="center"
image_size="550"
gap=3
yoffset=0
xoffset=0

# --- Misc -------------------------------------
stdout="off"
